<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Managers</h2>
    <button class="btn btn-primary" (click)="openCreate()">+ Nuovo</button>
  </div>

  <!-- Form -->
  <div *ngIf="showForm" class="card mb-3 p-3">
    <h5>{{ editMode ? 'Modifica' : 'Nuovo' }} Manager</h5>
    <div class="mb-2">
      <label>Nome</label>
      <input class="form-control" [(ngModel)]="formData.name" />
    </div>
    <div class="mb-2">
      <label>Email</label>
      <input class="form-control" [(ngModel)]="formData.email" />
    </div>
    <div class="mb-2">
      <label>Telefono</label>
      <input class="form-control" [(ngModel)]="formData.phone" />
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-success" (click)="save()">Salva</button>
      <button class="btn btn-secondary" (click)="showForm = false">Annulla</button>
    </div>
  </div>

  <!-- Tabella -->
  <table class="table table-bordered table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Telefono</th>
        <th>Member</th>
        <th>Azioni</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let m of managers">
        <td>{{ m.id }}</td>
        <td>{{ m.name }}</td>
        <td>{{ m.email }}</td>
        <td>{{ m.phone || '-' }}</td>
        <td>{{ m.memberCount }}</td>
        <td>
          <button class="btn btn-sm btn-warning me-1" (click)="openEdit(m)">Modifica</button>
          <button class="btn btn-sm btn-danger" (click)="delete(m.id!)">Elimina</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
